<body>
    <header>
        <div class="container">
            <h1>Sex Cams Gratuites</h1>
            <p class="subtitle">Live Cam Rooms • Webcams adultes en direct</p>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <input type="text" id="search" class="search" placeholder="Rechercher un modèle, tag ou pays..." autocomplete="off">
            
            <div class="filters">
                <button class="filter active" data-gender="all">Tous</button>
                <button class="filter" data-gender="f">Femmes</button>
                <button class="filter" data-gender="c">Couples</button>
                <button class="filter" data-gender="m">Hommes</button>
            </div>
        </div>

        <div class="stats" id="stats">Chargement des rooms en direct...</div>

        <div class="grid" id="grid"></div>
    </div>

    <footer>
        <p>© 2026 LiveCamRooms • Tous les liens sont des liens affiliés revshare</p>
        <p>Contenu pour adultes • 18+</p>
    </footer>

    <script>
        const API_URL = 'https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip&limit=200';
        let allRooms = [];

        async function fetchRooms() {
            const statsEl = document.getElementById('stats');
            statsEl.textContent = 'Chargement des cams en direct...';
            
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                allRooms = data.results || data || [];
                
                statsEl.textContent = `${allRooms.length} cams en direct • Mis à jour à l'instant`;
                renderRooms(allRooms);
            } catch (e) {
                statsEl.textContent = 'Erreur de chargement. Actualisez la page.';
                console.error(e);
            }
        }

        function createRevshareLink(room) {
            // Use the revshare URL provided by the API
            return room.chat_room_url_revshare || 
                   `https://chaturbate.com/in/?tour=APi5&campaign=T2CSW&track=default&room=${room.username}`;
        }

        function renderRooms(rooms) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            rooms.forEach(room => {
                const viewers = parseInt(room.num_users) || 0;
                const genderEmoji = room.gender === 'f' ? '♀️' : room.gender === 'm' ? '♂️' : '👫';
                
                const card = document.createElement('div');
                card.className = 'cam-card';
                card.innerHTML = `
                    <div class="thumb">
                        <img src="${room.image_url_360x270 || room.image_url}" alt="${room.username}" loading="lazy">
                        <div class="live-badge">LIVE</div>
                    </div>
                    <div class="info">
                        <div class="username">${room.display_name || room.username} ${genderEmoji}</div>
                        <div class="meta">
                            <span class="viewers">${viewers.toLocaleString()} viewers</span>
                            <span>${room.country || room.location || '—'}</span>
                        </div>
                        <div class="subject">${room.room_subject ? room.room_subject.substring(0, 120) + '...' : 'En direct maintenant'}</div>
                        <a href="${createRevshareLink(room)}" target="_blank" class="watch-btn">Regarder en direct →</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Search and filter
        function filterRooms() {
            const searchTerm = document.getElementById('search').value.toLowerCase().trim();
            const activeGender = document.querySelector('.filter.active').dataset.gender;
            
            let filtered = allRooms;
            
            if (searchTerm) {
                filtered = filtered.filter(room => 
                    (room.username && room.username.toLowerCase().includes(searchTerm)) ||
                    (room.display_name && room.display_name.toLowerCase().includes(searchTerm)) ||
                    (room.room_subject && room.room_subject.toLowerCase().includes(searchTerm)) ||
                    (room.tags && room.tags.some(t => t.toLowerCase().includes(searchTerm)))
                );
            }
            
            if (activeGender !== 'all') {
                filtered = filtered.filter(room => room.gender === activeGender);
            }
            
            renderRooms(filtered);
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', filterRooms);
        
        document.querySelectorAll('.filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterRooms();
            });
        });

        // Initial load
        fetchRooms();
        
        // Auto refresh every 45 seconds
        setInterval(fetchRooms, 45000);
    </script>
