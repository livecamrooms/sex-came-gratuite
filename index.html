<?xml version="1.0" encoding="UTF-8" ?>
<b:skin><![CDATA[
body {
  background: #0E1C4F;
  color: #ffffff;
  font-family: Arial, sans-serif;
}

.header {
  padding: 20px;
  background: #000000;
  backdrop-filter: blur(10px);
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.neon {
  color: #00ffff;
  text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff;
}
]]></b:skin>

<html>
<body>
<div class="header">Premium Header</div>
<div class="card">Glass Card UI</div>
<p class="neon">Neon Text Effect</p>
</body>
</html>
